<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<title>Aura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-screen">
  <div class="login-glow"></div>
  <div class="login-content">
    <h1 class="aura-title">Aura</h1>
    <button id="connectBtn" class="glass-btn connect-btn">Connect Spotify</button>
    <p id="loginError" class="login-error"></p>
  </div>
</div>
<script src="auth.js"></script>
<script>
document.getElementById('connectBtn').addEventListener('click', () => {
  startLogin().catch(err => {
    document.getElementById('loginError').textContent = err.message || 'Could not start login.';
  });
});

// If already logged in with a valid (or refreshable) token, skip straight to app
(function checkExisting() {
  const expiresAt = localStorage.getItem('aura_expires_at');
  const refreshToken = localStorage.getItem('aura_refresh_token');
  if (expiresAt && refreshToken) {
    window.location.href = 'app.html';
  }
})();
</script>
</body>
</html>
