<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<title>Aura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-root">
  <div class="ambient-bg" id="ambientBg"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="views-container">

    <!-- VIEW 1: NOW PLAYING -->
    <section class="view now-playing-view active" id="view-nowplaying">
      <div class="album-art-wrap">
        <div class="album-glow" id="albumGlow"></div>
        <img class="album-art" id="albumArt" alt="">
      </div>

      <div class="track-info">
        <div class="track-title-wrap"><span class="track-title" id="trackTitle">Nothing playing</span></div>
        <div class="track-artist" id="trackArtist">—</div>
        <div class="track-album" id="trackAlbum">—</div>
      </div>

      <div class="progress-row">
        <div class="progress-bar-track" id="progressBarTrack">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBarFill"></div>
          </div>
        </div>
        <div class="progress-times">
          <span id="positionTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>

      <div class="controls-row">
        <button class="ctrl-btn shuffle" id="shuffleBtn" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="ctrl-btn prev" id="prevBtn" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM18 6v12l-8.5-6z"/></svg>
        </button>
        <button class="ctrl-btn play" id="playBtn" title="Play/Pause">
          <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn next" id="nextBtn" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
        </button>
        <button class="ctrl-btn repeat" id="repeatBtn" title="Repeat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <svg class="volume-icon" id="volumeIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
      </div>

      <div class="waveform-pill">
        <div class="waveform-bars" id="waveformBars"><span></span><span></span><span></span></div>
        <span>Playing on Aura</span>
      </div>
    </section>

    <!-- VIEW 2: QUEUE -->
    <section class="view" id="view-queue">
      <h1 class="view-header">Queue</h1>
      <div id="queueList"></div>
    </section>

    <!-- VIEW 3: SEARCH -->
    <section class="view" id="view-search">
      <h1 class="view-header">Search</h1>
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Songs, artists, albums...">
      </div>
      <div id="searchResults">
        <p class="search-empty">Search for something to play</p>
      </div>
    </section>

    <!-- VIEW 4: LIBRARY -->
    <section class="view" id="view-library">
      <h1 class="view-header" id="libraryHeader">Library</h1>
      <div id="libraryContent"></div>
    </section>

    <!-- VIEW 5: SETTINGS / PROFILE -->
    <section class="view" id="view-settings">
      <h1 class="view-header">Profile</h1>
      <div class="profile-card glass-btn" id="profileCard">
        <img class="profile-avatar" id="profileAvatar" alt="">
        <div>
          <div class="profile-name" id="profileName">—</div>
        </div>
      </div>

      <div class="settings-section-label">Playing on</div>
      <div id="deviceList"></div>

      <button class="glass-btn logout-btn" id="logoutBtn">Log Out</button>
      <div class="app-version">Aura v1.0.0</div>
    </section>

  </div>

  <!-- MINI PLAYER -->
  <div class="mini-player" id="miniPlayer">
    <img id="miniArt" alt="">
    <div class="mini-player-info">
      <div class="mini-player-title" id="miniTitle">—</div>
      <div class="mini-player-artist" id="miniArtist">—</div>
    </div>
    <div class="mini-player-controls">
      <button class="mini-btn" id="miniPlayBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" id="miniPlayIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="mini-btn" id="miniNextBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="nowplaying">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 9.5h3V21h6v-6h2v6h6V9.5h3z"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-view="queue">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zM4 11h10v2H4zM4 16h10v2H4zM16 11v6l5-3z"/></svg>
      <span class="nav-label">Queue</span>
    </button>
    <button class="nav-item" data-view="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <span class="nav-label">Search</span>
    </button>
    <button class="nav-item" data-view="library">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 22V2l8 4 8-4v20l-8-4z"/></svg>
      <span class="nav-label">Library</span>
    </button>
    <button class="nav-item" data-view="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span class="nav-label">Profile</span>
    </button>
  </nav>
</div>

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
