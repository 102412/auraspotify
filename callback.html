<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Aura — Connecting…</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="callback-screen">
  <div class="spinner"></div>
  <p id="callbackMsg">Connecting to Spotify…</p>
</div>
<script src="auth.js"></script>
<script>
(async function () {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const msg = document.getElementById('callbackMsg');

  if (error) {
    msg.textContent = 'Spotify login failed: ' + error;
    return;
  }
  if (!code) {
    msg.textContent = 'No authorization code received.';
    return;
  }

  try {
    await exchangeCodeForToken(code);
    window.location.href = 'app.html';
  } catch (e) {
    msg.textContent = 'Could not complete login. Please try again.';
  }
})();
</script>
</body>
</html>
